<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4921C"/>
      <stop offset="50%" stop-color="#C07810"/>
      <stop offset="100%" stop-color="#8B5205"/>
    </linearGradient>
    <linearGradient id="spine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5C3502"/>
      <stop offset="100%" stop-color="#9A5C08"/>
    </linearGradient>
    <linearGradient id="pages" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5EDD0"/>
      <stop offset="100%" stop-color="#D8C898"/>
    </linearGradient>
    <linearGradient id="cross" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF5B0"/>
      <stop offset="100%" stop-color="#D4A820"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="30%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="4" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Pas de fond - transparent -->

